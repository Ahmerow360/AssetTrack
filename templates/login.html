<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – AssetTrack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f1923 0%, #1a2c3d 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .login-card {
            background: #fff;
            border-radius: 16px;
            padding: 40px 36px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo-wrap {
            text-align: center;
            margin-bottom: 28px;
        }
        .logo-icon {
            width: 56px; height: 56px;
            background: #185FA5;
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
        }
        .logo-icon i { color: #fff; font-size: 26px; }
        .logo-title { font-size: 22px; font-weight: 700; color: #111827; margin-bottom: 2px; }
        .logo-sub { font-size: 13px; color: #9ca3af; }
        .form-label { font-size: 12px; font-weight: 600; color: #374151; }
        .form-control {
            font-size: 14px;
            padding: 10px 14px;
            border-color: #d1d5db;
            border-radius: 8px;
        }
        .form-control:focus {
            border-color: #185FA5;
            box-shadow: 0 0 0 3px rgba(24,95,165,0.12);
        }
        .input-group-text {
            background: #f9fafb;
            border-color: #d1d5db;
            color: #6b7280;
        }
        .btn-login {
            background: #185FA5;
            color: #fff;
            border: none;
            padding: 11px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            width: 100%;
            margin-top: 4px;
            transition: background 0.2s;
        }
        .btn-login:hover { background: #0C447C; color: #fff; }
        .creds-box {
            background: #f0f9ff;
            border: 1px solid #bae6fd;
            border-radius: 8px;
            padding: 12px 14px;
            font-size: 12px;
            color: #0369a1;
            margin-top: 20px;
        }
        .creds-box strong { display: block; margin-bottom: 6px; color: #0c4a6e; }
        .cred-row { display: flex; justify-content: space-between; padding: 2px 0; }
        .alert { border-radius: 8px; font-size: 13px; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="logo-wrap">
        <div class="logo-icon"><i class="bi bi-hdd-rack-fill"></i></div>
        <div class="logo-title">AssetTrack</div>
        <div class="logo-sub">IT Asset Management System</div>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
        <div class="alert alert-{{ 'success' if category == 'success' else 'danger' if category == 'error' else 'info' }} alert-dismissible fade show">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
    {% endwith %}

    <form method="post">
        <div class="mb-3">
            <label class="form-label">Username</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-person"></i></span>
                <input type="text" name="username" class="form-control" placeholder="Enter username" autofocus required>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" name="password" id="password" class="form-control" placeholder="Enter password" required>
                <button class="btn btn-outline-secondary" type="button" onclick="togglePw()" tabindex="-1">
                    <i class="bi bi-eye" id="eye-icon"></i>
                </button>
            </div>
        </div>
        <button type="submit" class="btn-login">
            <i class="bi bi-box-arrow-in-right me-2"></i>Login
        </button>
    </form>
<!--
    <div class="creds-box">
        <strong><i class="bi bi-info-circle me-1"></i>Default Login Credentials</strong>
        <div class="cred-row"><span>👑 Admin:</span><span><code>admin</code> / <code>admin123</code></span></div>
        <div class="cred-row"><span>👁 Viewer:</span><span><code>viewer</code> / <code>viewer123</code></span></div>
        <div style="margin-top:8px; font-size:11px; color:#0369a1; opacity:0.8">
            Change password after first login from User Management.
        </div>
    </div>
</div>
-->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
function togglePw() {
    const pw = document.getElementById('password');
    const icon = document.getElementById('eye-icon');
    if (pw.type === 'password') {
        pw.type = 'text';
        icon.className = 'bi bi-eye-slash';
    } else {
        pw.type = 'password';
        icon.className = 'bi bi-eye';
    }
}
</script>
</body>
</html>
